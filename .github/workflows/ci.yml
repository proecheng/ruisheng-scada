name: CI

on:
  push:
    branches: [master, develop]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: uv sync --all-packages
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run mypy .

  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: uv sync --all-packages
      - run: uv run pytest tests/unit tests/tools -v --cov=ruisheng-shared/src --cov-fail-under=90

  integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: timescale/timescaledb:2.16.1-pg15
        env:
          POSTGRES_USER: ruisheng_dev
          POSTGRES_PASSWORD: ruisheng_dev
          POSTGRES_DB: ruisheng
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U ruisheng_dev"
          --health-interval 5s --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
    env:
      # v1.8 #22-B：D3 migration _require_env + conftest api/gw_engine fixture 必读；CI-only 值
      RUISHENG_GW_PASSWORD: ci-gw-change-me
      RUISHENG_API_PASSWORD: ci-api-change-me
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv sync --all-packages
      - run: uv run alembic upgrade head
        env:
          DATABASE_URL: postgresql+asyncpg://ruisheng_dev:ruisheng_dev@127.0.0.1:5432/ruisheng
      - run: uv run pytest tests/integration -v -m integration
        env:
          DATABASE_URL: postgresql+asyncpg://ruisheng_dev:ruisheng_dev@127.0.0.1:5432/ruisheng
          REDIS_URL: redis://127.0.0.1:6379/0

  alembic-check:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: timescale/timescaledb:2.16.1-pg15
        env:
          POSTGRES_USER: ruisheng_dev
          POSTGRES_PASSWORD: ruisheng_dev
          POSTGRES_DB: ruisheng
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready"
          --health-interval 5s --health-retries 10
    env:
      # v1.8 #22-B：D3 migration _require_env 必读；CI-only 值
      RUISHENG_GW_PASSWORD: ci-gw-change-me
      RUISHENG_API_PASSWORD: ci-api-change-me
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv sync --all-packages
      - name: 验证迁移对称（up → down → up）
        run: |
          uv run alembic upgrade head
          uv run alembic downgrade base
          uv run alembic upgrade head
        env:
          DATABASE_URL: postgresql+asyncpg://ruisheng_dev:ruisheng_dev@127.0.0.1:5432/ruisheng

  schema-version-guard:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v3
      - run: uv sync --all-packages
      - name: 检查 SHARED_SCHEMA_VERSION 是否随 models 变更同步升级
        run: uv run python tools/verify_schema_version.py

  gw-smoke:
    runs-on: ubuntu-latest
    env:
      GW_LISTEN_HOST: "0.0.0.0"
      GW_LISTEN_PORT: "5020"
      GW_DATABASE_URL: postgresql+asyncpg://u:p@h:5432/d
      GW_REDIS_URL: redis://h:6379/0
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: uv sync --all-packages
      - run: uv run python -m ruisheng_gw --check-only

  gw-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with: { enable-cache: true }
      - run: uv sync --all-packages
      - run: uv run pytest ruisheng-gw/tests/unit ruisheng-gw/tests/property -v --cov=ruisheng-gw/src --cov-fail-under=85

  gw-integration:
    runs-on: ubuntu-latest
    env:
      RUISHENG_GW_PASSWORD: ci-gw-change-me
      RUISHENG_API_PASSWORD: ci-api-change-me
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with: { enable-cache: true }
      - run: uv sync --all-packages
      - run: docker compose -f docker-compose.dev.yml up -d --wait
      - run: uv run alembic upgrade head
      - run: uv run pytest ruisheng-gw/tests/integration -v --reruns=2

  gw-replay:
    runs-on: ubuntu-latest
    env:
      RUISHENG_GW_PASSWORD: ci-gw-change-me
      RUISHENG_API_PASSWORD: ci-api-change-me
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with: { enable-cache: true }
      - run: uv sync --all-packages
      - run: docker compose -f docker-compose.dev.yml up -d --wait
      - run: uv run alembic upgrade head
      - run: uv run python tools/pcap_gen/scripts/gen_initial_corpus.py
      - run: uv run pytest ruisheng-gw/tests/replay -v

  gw-tenant-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with: { enable-cache: true }
      - run: uv sync --all-packages
      - run: uv run python -m ruisheng_gw.ci_lint.tenant_filter_lint

  gw-benchmark:
    runs-on: ubuntu-latest
    env:
      RUISHENG_GW_PASSWORD: ci-gw-change-me
      RUISHENG_API_PASSWORD: ci-api-change-me
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with: { enable-cache: true }
      - run: uv sync --all-packages
      - run: docker compose -f docker-compose.dev.yml up -d --wait
      - run: uv run alembic upgrade head
      - run: uv run pytest ruisheng-gw/tests/integration/test_p95_flush.py --benchmark-only -v --reruns=2

  api-unit:
    name: api-unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - run: uv sync --all-packages
      - run: uv run pytest ruisheng-api/tests/unit -x --cov=ruisheng-api/src --cov-report=xml --cov-fail-under=60

  api-integration:
    name: api-integration
    runs-on: ubuntu-latest
    services:
      postgres:
        image: timescale/timescaledb:latest-pg15
        env:
          POSTGRES_PASSWORD: dev
          POSTGRES_USER: ruisheng_dev
          POSTGRES_DB: ruisheng
        options: >-
          --health-cmd="pg_isready -U ruisheng_dev"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
        ports:
          - "5432:5432"
      redis:
        image: redis:7
        ports:
          - "6379:6379"
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - run: uv sync --all-packages
      - run: uv run alembic upgrade head
        env:
          DATABASE_URL: postgresql+asyncpg://ruisheng_dev:dev@localhost:5432/ruisheng
          RUISHENG_GW_PASSWORD: ci-gw-change-me
          RUISHENG_API_PASSWORD: ci-api-change-me
      - run: uv run pytest ruisheng-api/tests/integration -x || [ $? = 5 ]
        env:
          API_DB_URL: postgresql+asyncpg://ruisheng_api:dev@localhost:5432/ruisheng
          API_GW_DB_URL: postgresql+asyncpg://ruisheng_gw:dev@localhost:5432/ruisheng
          API_REDIS_URL: redis://localhost:6379/0
          API_JWT_SECRET: xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx

  api-tenant-lint:
    name: api-tenant-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - run: uv sync --all-packages
      - run: uv run python -m ruisheng_gw.ci_lint.tenant_filter_lint ruisheng-api/src
